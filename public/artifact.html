function saveCart() {
  localStorage.setItem('illiana-cart', JSON.stringify(state.cart));
  render();
}

function addToCart(productId, qty = 1) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product || product.stock <= 0) return;
  const existing = state.cart.find(i => i.productId === productId);
  if (existing) {
    existing.quantity += qty;
  } else {
    state.cart.push({ productId, slug: product.slug, name: product.name, price: product.price, emoji: product.emoji, gradient: product.gradient, quantity: qty });
  }
  state.cartOpen = true;
  saveCart();
}

function removeFromCart(productId) {
  state.cart = state.cart.filter(i => i.productId !== productId);
  saveCart();
}

function updateQty(productId, qty) {
  if (qty <= 0) return removeFromCart(productId);
  const item = state.cart.find(i => i.productId === productId);
  if (item) { item.quantity = qty; saveCart(); }
}

function stars(rating, size = 'sm') {
  const sz = size === 'xs' ? 'w-3 h-3' : size === 'sm' ? 'w-3.5 h-3.5' : 'w-4 h-4';
  let html = '<div class="flex items-center gap-0.5">';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= Math.floor(rating);
    const half = i === Math.floor(rating) + 1 && rating - Math.floor(rating) >= 0.5;
    html += `<svg class="${sz}" viewBox="0 0 24 24" style="color:${filled || half ? '#c9a961' : '#e7e0d3'}"><path fill="currentColor" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>`;
  }
  html += '</div>';
  return html;
}

function render() {
  const app = document.getElementById('app');
  let html = renderHeader();
  html += `<main>`;
  if (state.view === 'home') html += renderHome();
  else if (state.view === 'shop') html += renderShop();
  else if (state.view === 'product') html += renderProduct();
  else if (state.view === 'checkout') html += renderCheckout();
  else if (state.view === 'confirmation') html += renderConfirmation();
  html += `</main>`;
  html += renderFooter();
  html += renderCartDrawer();
  app.innerHTML = html;
  bindEvents();
}

// ── Shop ──
function renderShop() {
  const f = state.shopFilters;
  let filtered = [...PRODUCTS];
  if (f.category !== 'All') filtered = filtered.filter(p => p.category === f.category);
  if (f.price) {
    const [min, max] = f.price.split('-').map(Number);
    filtered = filtered.filter(p => p.price >= min && p.price <= max);
  }
  if (f.tags.length > 0) filtered = filtered.filter(p => f.tags.every(t => p.tags.includes(t)));
  if (f.q) {
    const q = f.q.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.tagline.toLowerCase().includes(q));
  }
  switch (f.sort) {
    case 'price-asc': filtered.sort((a,b) => a.price - b.price); break;
    case 'price-desc': filtered.sort((a,b) => b.price - a.price); break;
    case 'rating': filtered.sort((a,b) => b.rating - a.rating); break;
    case 'newest': filtered.reverse(); break;
    case 'bestseller': filtered.sort((a,b) => Number(b.bestseller) - Number(a.bestseller)); break;
  }
  const categories = ['All', 'Whole Fish', 'Lumpia & Snacks', 'Gift Sets'];
  const priceRanges = [{l:'Under ₱500',v:'0-500'},{l:'₱500 – ₱800',v:'500-800'},{l:'₱800 – ₱1,500',v:'800-1500'},{l:'Over ₱1,500',v:'1500-999999'}];
  const tags = ['Bestseller','Spicy','Premium','Gift','Family Recipe','No Preservatives'];
  return `
  <div class="bg-cream">
    <div class="border-b border-bone bg-cream-dark">
      <div class="max-w-7xl mx-auto px-4 py-12 sm:px-6 lg:px-8 lg:py-16">

        <p class="mt-3 max-w-xl text-stone">Every product is hand-made to order. Browse our full collection, filter by what you're craving, and bring a piece of the family table home.</p>
      </div>
    </div>
    <div class="max-w-7xl mx-auto px-4 py-10 sm:px-6 lg:px-8 lg:py-14">
      <div class="grid gap-8 lg:grid-cols-[260px_1fr]">
        <aside class="lg:sticky lg:top-24">
          <div class="rounded-2xl border border-bone bg-white/60 p-5 lg:p-6">
            <h3 class="font-display text-lg text-charcoal">Filters</h3>
            <div class="mt-5">
              <h4 class="text-xs font-semibold uppercase tracking-wider text-stone">Category</h4>
              <ul class="mt-2 space-y-1.5">
                ${categories.map(c => `<li><button onclick="setShopFilter('category','${c}')" class="text-sm transition-colors ${f.category===c?'font-medium text-forest':'text-stone hover:text-charcoal'}">${c}</button></li>`).join('')}
              </ul>
            </div>
            <div class="mt-6">
              <h4 class="text-xs font-semibold uppercase tracking-wider text-stone">Price Range</h4>
              <ul class="mt-2 space-y-1.5">
                ${priceRanges.map(r => `<li><button onclick="setShopFilter('price','${r.v}')" class="text-sm transition-colors ${f.price===r.v?'font-medium text-forest':'text-stone hover:text-charcoal'}">${r.l}</button></li>`).join('')}
              </ul>
            </div>
            <div class="mt-6">
              <h4 class="text-xs font-semibold uppercase tracking-wider text-stone">Attributes</h4>
              <div class="mt-2 flex flex-wrap gap-1.5">
                ${tags.map(t => `<button onclick="toggleTag('${t}')" class="rounded-full border px-3 py-1 text-xs transition-colors ${f.tags.includes(t)?'border-forest bg-forest text-cream':'border-bone bg-white text-stone hover:border-forest hover:text-forest'}">${t}</button>`).join('')}

          </div>
          <p class="mt-4 px-1 text-xs text-stone">Showing ${filtered.length} ${filtered.length===1?'product':'products'}</p>

        <div>

            <label class="text-sm text-stone">Sort by:</label>
            <select onchange="setShopFilter('sort', this.value)" class="appearance-none rounded-full border border-bone bg-white py-2 pl-4 pr-10 text-sm outline-none focus:border-forest">
              ${[{v:'featured',l:'Featured'},{v:'bestseller',l:'Bestsellers'},{v:'price-asc',l:'Price: Low to High'},{v:'price-desc',l:'Price: High to Low'},{v:'rating',l:'Top Rated'},{v:'newest',l:'Newest'}].map(s => `<option value="${s.v}" ${f.sort===s.v?'selected':''}>${s.l}</option>`).join('')}

      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// EVENT BINDING
// ─────────────────────────────────────────────
function bindEvents() {
  // Nothing needed — all events use onclick handlers
}

// ── Navigation ──
function go(view, productId = null) {
  state.view = view;
  if (productId) state.activeProduct = PRODUCTS.find(p => p.id === productId) || null;
  if (view === 'checkout') state.checkout.step = 1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function toggleCart() {
  state.cartOpen = !state.cartOpen;
  if (state.cartOpen) document.body.style.overflow = 'hidden';
  else document.body.style.overflow = '';
  render();
}

function setShopFilter(key, value) {
  state.shopFilters[key] = value;
}

function toggleTag(tag) {
  const idx = state.shopFilters.tags.indexOf(tag);
  if (idx >= 0) state.shopFilters.tags.splice(idx, 1);
  else state.shopFilters.tags.push(tag);
  render();
}

let productQty = {};
function getQty(id) { return productQty[id] || 1; }
function changeQty(id, delta) {
  const cur = getQty(id);
  const next = Math.max(1, cur + delta);
  productQty[id] = next;
  const el = document.getElementById(`qty-${id}`);
  if (el) el.textContent = next;
}

let reviewRating = 5;
function setReviewStar(s) {
  reviewRating = s;
  document.querySelectorAll('#rv-stars button').forEach(btn => {
    const star = parseInt(btn.dataset.star);
    btn.querySelector('svg').style.color = star <= s ? '#c9a961' : '#e7e0d3';
  });
}

function toggleReviewForm() {
  const form = document.getElementById('review-form');
  if (form) form.classList.toggle('hidden');
}

function submitReview(productId) {
  const author = document.getElementById('rv-author')?.value;
  const title = document.getElementById('rv-title')?.value;
  const body = document.getElementById('rv-body')?.value;
  if (!author || !title || !body) return;
  if (!REVIEWS[productId]) REVIEWS[productId] = [];
  REVIEWS[productId].unshift({ author, location: 'Philippines', rating: reviewRating, title, body, verified: false, date: new Date().toISOString().split('T')[0] });
  state.submittedReview = true;
  render();
  setTimeout(() => { state.submittedReview = false; }, 4000);
}

function placeOrder(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  state.checkout.customerName = fd.get('name');
  state.checkout.orderNumber = 'ILL-' + Math.random().toString(36).substring(2, 10).toUpperCase();
  state.cart = [];
  localStorage.removeItem('illiana-cart');
  state.view = 'confirmation';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// ── Init ──
render();
</script>
